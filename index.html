<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>推しパズルメーカー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== 再開ダイアログ ===== -->
<div id="resumeDialog" class="screen hidden">
  <div class="dialog-box">
    <div class="dialog-icon">🧩</div>
    <div class="dialog-title">前回の続きがあります</div>
    <div class="dialog-sub" id="resumeSub">前回の途中保存から再開しますか？</div>
    <div class="dialog-buttons">
      <button class="btn btn-primary" id="resumeBtn">続きから再開する</button>
      <button class="btn btn-secondary" id="newGameBtn">新しく始める</button>
    </div>
  </div>
</div>

<!-- ===== スタート画面 ===== -->
<div id="startScreen" class="screen hidden">
  <div class="app-title">推しパズルメーカー</div>
  <p class="app-sub">画像をジグソーパズルにしよう</p>

  <!-- 画像アップロード -->
  <div class="card">
    <div class="card-title">画像を選ぶ</div>
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*">
      <div id="uploadPlaceholder">
        <div class="upload-icon">🌸</div>
        <div class="upload-label">タップして画像を選択</div>
        <div class="upload-sub">カメラロールからも選べます</div>
      </div>
      <img id="previewImg" class="preview-img" alt="プレビュー">
    </div>
  </div>

  <!-- 難易度選択 -->
  <div class="card">
    <div class="card-title">難易度（ピース数）</div>
    <div class="difficulty-grid">
      <button class="diff-btn" data-cols="3" data-rows="3">
        <span class="pieces">9</span>
        <span class="label">かんたん</span>
      </button>
      <button class="diff-btn selected" data-cols="4" data-rows="4">
        <span class="pieces">16</span>
        <span class="label">ふつう</span>
      </button>
      <button class="diff-btn" data-cols="5" data-rows="5">
        <span class="pieces">25</span>
        <span class="label">むずかしい</span>
      </button>
      <button class="diff-btn" data-cols="6" data-rows="6">
        <span class="pieces">36</span>
        <span class="label">ハード</span>
      </button>
      <button class="diff-btn" data-cols="8" data-rows="8">
        <span class="pieces">64</span>
        <span class="label">エキスパート</span>
      </button>
      <button class="diff-btn" data-cols="10" data-rows="10">
        <span class="pieces">100</span>
        <span class="label">超ハード</span>
      </button>
    </div>
  </div>

  <button class="btn btn-primary" id="startBtn" disabled>パズルをはじめる</button>
</div>

<!-- ===== パズル画面 ===== -->
<div id="puzzleScreen" class="screen hidden">
  <div class="puzzle-header">
    <div class="puzzle-timer" id="timerDisplay">00:00</div>
    <div class="puzzle-progress">
      <div id="progressText">0 / 0</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <button class="btn btn-danger" id="resetBtn" style="width:auto;max-width:none;padding:8px 14px;font-size:0.78rem;">リセット</button>
  </div>
  <div id="canvasContainer">
    <canvas id="puzzleCanvas"></canvas>
  </div>
</div>

<!-- ===== クリア画面 ===== -->
<div id="completeScreen" class="screen hidden">
  <div class="complete-emoji">🎉</div>
  <div class="complete-title">パズル完成！</div>
  <div class="complete-time" id="completeTime">00:00</div>
  <div class="complete-sub" id="completeSub"></div>
  <button class="btn btn-primary" id="playAgainBtn">もう一度遊ぶ</button>
</div>

<script type="module">
import { initDB, saveState, loadState, clearState, hasSavedState } from './storage.js';
import { Puzzle, formatTime } from './puzzle.js';

// ===== 状態 =====
let selectedCols = 4, selectedRows = 4;
let imageBlob = null;
let imageEl = null;
let puzzle = null;

// ===== 要素取得 =====
const screens = {
  resume:   document.getElementById('resumeDialog'),
  start:    document.getElementById('startScreen'),
  puzzle:   document.getElementById('puzzleScreen'),
  complete: document.getElementById('completeScreen'),
};
const fileInput     = document.getElementById('fileInput');
const previewImg    = document.getElementById('previewImg');
const uploadPlaceholder = document.getElementById('uploadPlaceholder');
const startBtn      = document.getElementById('startBtn');
const timerDisplay  = document.getElementById('timerDisplay');
const progressText  = document.getElementById('progressText');
const progressFill  = document.getElementById('progressFill');
const resumeBtn     = document.getElementById('resumeBtn');
const newGameBtn    = document.getElementById('newGameBtn');
const resumeSub     = document.getElementById('resumeSub');
const resetBtn      = document.getElementById('resetBtn');
const playAgainBtn  = document.getElementById('playAgainBtn');
const canvas        = document.getElementById('puzzleCanvas');

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.add('hidden'));
  screens[name].classList.remove('hidden');
}

// ===== 起動処理 =====
async function boot() {
  await initDB();
  if (hasSavedState()) {
    const state = await loadState();
    if (state) {
      const mins = Math.floor(state.elapsed / 60);
      const secs = state.elapsed % 60;
      const placed = state.pieces.filter(p => p.placed).length;
      const total = state.pieces.length;
      resumeSub.textContent = `${state.cols * state.rows}ピース・${placed}/${total}個配置済み・${mins}分${secs}秒経過`;
      showScreen('resume');
      return;
    }
  }
  showScreen('start');
}

// ===== 再開 =====
resumeBtn.addEventListener('click', async () => {
  const state = await loadState();
  if (!state) { showScreen('start'); return; }
  imageBlob = state.imageBlob;
  const img = await blobToImage(imageBlob);
  startPuzzle(img, state.cols, state.rows, state.elapsed, state.pieces);
});

newGameBtn.addEventListener('click', async () => {
  await clearState();
  showScreen('start');
});

// ===== 画像選択 =====
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  imageBlob = file;
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  previewImg.style.display = 'block';
  uploadPlaceholder.style.display = 'none';
  startBtn.disabled = false;
});

// ドラッグ＆ドロップ（PC）
const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    imageBlob = file;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    previewImg.style.display = 'block';
    uploadPlaceholder.style.display = 'none';
    startBtn.disabled = false;
  }
});

// ===== 難易度選択 =====
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedCols = parseInt(btn.dataset.cols);
    selectedRows = parseInt(btn.dataset.rows);
  });
});

// ===== パズル開始 =====
startBtn.addEventListener('click', async () => {
  if (!imageBlob) return;
  await clearState();
  const img = await blobToImage(imageBlob);
  startPuzzle(img, selectedCols, selectedRows, 0, null);
});

function blobToImage(blob) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = url;
  });
}

function startPuzzle(img, cols, rows, elapsed, savedPieces) {
  imageEl = img;
  showScreen('puzzle');

  if (puzzle) puzzle.destroy();

  const total = cols * rows;
  let placed = savedPieces ? savedPieces.filter(p => p.placed).length : 0;

  puzzle = new Puzzle({
    canvas,
    image: img,
    cols,
    rows,
    elapsed,
    savedPieces,
    onComplete: (sec) => {
      showScreen('complete');
      document.getElementById('completeTime').textContent = formatTime(sec);
      document.getElementById('completeSub').textContent =
        `${cols * rows}ピースを${Math.floor(sec/60)}分${sec%60}秒でクリア！`;
    },
    onUpdate: (sec) => {
      timerDisplay.textContent = formatTime(sec);
      // 進捗更新
      placed = puzzle.pieces.filter(p => p.placed).length;
      progressText.textContent = `${placed} / ${total}`;
      progressFill.style.width = `${(placed / total) * 100}%`;
    },
  });

  puzzle.setImageBlob(imageBlob);

  // 初期進捗
  progressText.textContent = `${placed} / ${total}`;
  progressFill.style.width = `${(placed / total) * 100}%`;
  timerDisplay.textContent = formatTime(elapsed);
}

// ===== リセット =====
resetBtn.addEventListener('click', async () => {
  if (!confirm('パズルをリセットしますか？\n保存データも削除されます。')) return;
  if (puzzle) { puzzle.destroy(); puzzle = null; }
  await clearState();
  // スタート画面に戻す（画像・設定はリセット）
  imageBlob = null;
  previewImg.style.display = 'none';
  uploadPlaceholder.style.display = '';
  startBtn.disabled = true;
  fileInput.value = '';
  showScreen('start');
});

// ===== もう一度 =====
playAgainBtn.addEventListener('click', () => {
  imageBlob = null;
  previewImg.style.display = 'none';
  uploadPlaceholder.style.display = '';
  startBtn.disabled = true;
  fileInput.value = '';
  showScreen('start');
});

boot();
</script>
</body>
</html>
